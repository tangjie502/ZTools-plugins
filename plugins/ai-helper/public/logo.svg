<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="256" height="256" rx="58" fill="url(#bg)"/>

  <!-- 天线杆 -->
  <line x1="128" y1="48" x2="128" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- 天线球 -->
  <circle cx="128" cy="42" r="10" fill="white"/>

  <!-- 头部 -->
  <rect x="56" y="72" width="144" height="144" rx="40" fill="white" opacity="0.95"/>

  <!-- 左眼 -->
  <circle cx="100" cy="140" r="20" fill="url(#bg)"/>
  <circle cx="108" cy="132" r="7" fill="white"/>

  <!-- 右眼 -->
  <circle cx="156" cy="140" r="20" fill="url(#bg)"/>
  <circle cx="164" cy="132" r="7" fill="white"/>

  <!-- 嘴巴 -->
  <path d="M108 178 Q128 198 148 178" fill="none" stroke="url(#bg)" stroke-width="5" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="82" cy="170" rx="12" ry="7" fill="#f9a8d4" opacity="0.5"/>
  <ellipse cx="174" cy="170" rx="12" ry="7" fill="#f9a8d4" opacity="0.5"/>
</svg>
